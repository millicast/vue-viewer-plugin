version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    exclude-paths:
      - "examples/**"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"

    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

    labels:
      - "dependencies"
      - "npm"

    commit-message:
      prefix: "deps"
      include: "scope"

    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        update-types:
          - "major"

    ignore:
      - dependency-name: "@types/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

    reviewers:
      - "millicast/reviewers"

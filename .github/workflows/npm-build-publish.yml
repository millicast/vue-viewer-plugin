name: npm-build-publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git reference to checkout'
        required: true
        type: string
      npm_tag:
        description: 'npm tag to publish package to'
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      npm_tag:
        required: false
        type: string
      dryrun:
        required: false
        type: boolean
        default: false

jobs:
  build-publish:
    name: "build-publish ${{ inputs.ref }}"
    runs-on: ubuntu-latest
    container: node:24-alpine
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: ./.github/actions/npm-build
        with:
          ref: ${{ inputs.ref }}

      - name: "npm publish"
        env:
          npm_tag: ${{ inputs.npm_tag }}
        shell: 'ash -e -o pipefail {0}'
        run: |
          set --
          if [ -n "${npm_tag}" ]; then
            set -- "$@" --tag "${npm_tag}"
          fi

          npm publish --provenance "$@"
